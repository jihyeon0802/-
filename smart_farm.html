<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>장미허브 성장일지</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Pretendard:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root {
  --cream: #F7F3EE;
  --warm-white: #FDFAF6;
  --sage: #7A9E7E;
  --sage-dark: #4A6B4E;
  --sage-light: #C8DCC9;
  --sage-pale: #EBF2EB;
  --brown: #8B6F5E;
  --brown-light: #C4A99A;
  --brown-pale: #F0E8E3;
  --text-dark: #2C2416;
  --text-mid: #6B5B4E;
  --text-light: #A89888;
  --border: rgba(122,158,126,0.2);
  --border-warm: rgba(139,111,94,0.15);
  --shadow: 0 4px 24px rgba(44,36,22,0.08);
  --shadow-lg: 0 12px 48px rgba(44,36,22,0.12);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Pretendard', sans-serif;
  background: var(--cream);
  color: var(--text-dark);
  min-height: 100vh;
}

/* ── HEADER ── */
header {
  background: var(--warm-white);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
  position: sticky; top: 0; z-index: 100;
}
.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
}
.logo {
  display: flex; align-items: center; gap: 12px;
  font-family: 'Gowun Batang', serif;
  font-size: 18px; font-weight: 700;
  color: var(--text-dark);
}
.logo-icon {
  width: 36px; height: 36px;
  background: var(--sage-pale);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.status-pill {
  display: flex; align-items: center; gap: 6px;
  background: var(--sage-pale);
  border: 1px solid var(--sage-light);
  border-radius: 100px;
  padding: 6px 14px;
  font-size: 12px; color: var(--sage-dark);
}
.pulse { width: 7px; height: 7px; background: var(--sage); border-radius: 50%; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.85)} }

nav { display: flex; gap: 2px; }
.nav-btn {
  padding: 8px 18px; border-radius: 8px;
  border: none; background: transparent;
  font-size: 13px; font-weight: 500;
  color: var(--text-mid); cursor: pointer;
  transition: all 0.2s;
}
.nav-btn:hover { background: var(--sage-pale); color: var(--sage-dark); }
.nav-btn.active { background: var(--sage); color: white; }

/* ── MAIN ── */
main { max-width: 1200px; margin: 0 auto; padding: 2rem; }

/* ── STAT BAR ── */
.stat-bar {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 2rem;
}
.stat-card {
  background: var(--warm-white);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  position: relative;
  overflow: hidden;
}
.stat-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--sage), var(--sage-light));
}
.stat-label { font-size: 11px; color: var(--text-light); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; }
.stat-value { font-size: 28px; font-weight: 600; color: var(--text-dark); line-height: 1; }
.stat-value span { font-size: 14px; font-weight: 400; color: var(--text-light); margin-left: 3px; }
.stat-sub { font-size: 11px; color: var(--text-light); margin-top: 6px; }

/* ── PAGES ── */
.page { display: none; }
.page.active { display: block; }

/* ── GALLERY PAGE ── */
.page-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1.5rem;
}
.page-title { font-family: 'Gowun Batang', serif; font-size: 22px; color: var(--text-dark); }
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 20px; border-radius: 10px;
  font-size: 13px; font-weight: 500; cursor: pointer;
  transition: all 0.18s; border: none;
}
.btn-primary { background: var(--sage); color: white; }
.btn-primary:hover { background: var(--sage-dark); }
.btn-outline {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-mid);
}
.btn-outline:hover { border-color: var(--sage); color: var(--sage-dark); }

.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px;
}
.photo-card {
  background: var(--warm-white);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  transition: transform 0.2s, box-shadow 0.2s;
}
.photo-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
.photo-img-wrap {
  height: 200px;
  background: var(--sage-pale);
  position: relative;
  overflow: hidden;
  cursor: pointer;
}
.photo-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
.photo-placeholder-wrap {
  height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 8px; color: var(--sage-dark); cursor: pointer;
}
.photo-placeholder-wrap svg { opacity: 0.5; }
.photo-ai-badge {
  position: absolute; top: 10px; right: 10px;
  background: rgba(44,36,22,0.75);
  color: white;
  font-size: 10px; letter-spacing: 0.04em;
  padding: 4px 10px; border-radius: 100px;
}
.photo-info { padding: 14px 16px; }
.photo-date { font-size: 11px; color: var(--text-light); margin-bottom: 6px; }
.photo-analysis {
  font-size: 13px; color: var(--text-mid); line-height: 1.6;
}
.photo-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.tag {
  font-size: 11px; padding: 3px 10px; border-radius: 100px;
  background: var(--sage-pale); color: var(--sage-dark);
  border: 1px solid var(--sage-light);
}

.upload-card {
  background: var(--warm-white);
  border: 2px dashed var(--sage-light);
  border-radius: 16px;
  height: 200px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 10px; cursor: pointer;
  transition: all 0.2s;
  color: var(--sage-dark);
}
.upload-card:hover { background: var(--sage-pale); border-color: var(--sage); }
.upload-card p { font-size: 13px; }
.upload-card small { font-size: 11px; color: var(--text-light); }

/* MODAL */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(44,36,22,0.5);
  z-index: 1000;
  align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--warm-white);
  border-radius: 20px;
  padding: 2rem;
  max-width: 560px; width: 90%;
  max-height: 90vh; overflow-y: auto;
  box-shadow: var(--shadow-lg);
}
.modal h3 { font-family: 'Gowun Batang', serif; font-size: 20px; margin-bottom: 1.5rem; color: var(--text-dark); }
.modal-img-preview {
  width: 100%; height: 220px;
  background: var(--sage-pale);
  border-radius: 12px; margin-bottom: 1rem;
  overflow: hidden; position: relative;
}
.modal-img-preview img { width: 100%; height: 100%; object-fit: cover; }
.modal-img-placeholder {
  height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 8px; color: var(--sage-dark);
}
.ai-result {
  background: var(--sage-pale);
  border: 1px solid var(--sage-light);
  border-radius: 12px;
  padding: 16px; margin: 1rem 0;
  font-size: 13px; line-height: 1.7; color: var(--text-mid);
  min-height: 80px;
}
.ai-result.loading { display: flex; align-items: center; gap: 10px; }
.ai-spinner {
  width: 20px; height: 20px; border-radius: 50%;
  border: 2px solid var(--sage-light);
  border-top-color: var(--sage);
  animation: spin 0.8s linear infinite; flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }
.form-row { margin-bottom: 1rem; }
.form-label { font-size: 12px; color: var(--text-light); margin-bottom: 6px; display: block; letter-spacing: 0.04em; }
.form-input {
  width: 100%; padding: 10px 14px;
  border: 1px solid var(--border-warm);
  border-radius: 10px;
  background: white; color: var(--text-dark);
  font-size: 14px; font-family: 'Pretendard', sans-serif;
  outline: none; transition: border 0.2s;
}
.form-input:focus { border-color: var(--sage); }
.form-textarea { min-height: 80px; resize: vertical; }
.modal-footer { display: flex; gap: 10px; margin-top: 1.5rem; justify-content: flex-end; }
.btn-sm { padding: 8px 16px; font-size: 12px; }

/* ── HUMIDITY PAGE ── */
.humidity-layout {
  display: grid;
  grid-template-columns: 1fr 320px;
  gap: 20px;
}
.card {
  background: var(--warm-white);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
}
.card-title {
  font-family: 'Gowun Batang', serif;
  font-size: 16px; color: var(--text-dark);
  margin-bottom: 1.5rem;
  display: flex; align-items: center; gap: 8px;
}
.chart-container { height: 300px; position: relative; }
.hum-form { display: flex; flex-direction: column; gap: 14px; }
.hum-input-row { display: flex; gap: 10px; }
.hum-badge {
  display: inline-block;
  padding: 3px 12px; border-radius: 100px;
  font-size: 11px; font-weight: 500;
}
.hum-ok { background: var(--sage-pale); color: var(--sage-dark); border: 1px solid var(--sage-light); }
.hum-low { background: #FEF3C7; color: #92400E; border: 1px solid #FCD34D; }
.hum-high { background: #FEE2E2; color: #991B1B; border: 1px solid #FCA5A5; }
.log-table { width: 100%; border-collapse: collapse; }
.log-table th {
  font-size: 11px; color: var(--text-light);
  letter-spacing: 0.05em; text-align: left;
  padding: 0 0 10px; border-bottom: 1px solid var(--border);
}
.log-table td {
  padding: 12px 0;
  font-size: 13px; color: var(--text-mid);
  border-bottom: 1px solid rgba(0,0,0,0.04);
  vertical-align: middle;
}
.log-table tr:last-child td { border-bottom: none; }

/* ── JOURNAL PAGE ── */
.journal-layout {
  display: grid;
  grid-template-columns: 1fr 360px;
  gap: 20px;
}
.journal-entries { display: flex; flex-direction: column; gap: 16px; }
.journal-entry {
  background: var(--warm-white);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  position: relative;
  overflow: hidden;
  transition: box-shadow 0.2s;
}
.journal-entry:hover { box-shadow: var(--shadow); }
.journal-entry::after {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px;
  background: linear-gradient(180deg, var(--sage), var(--sage-light));
}
.journal-date {
  font-size: 11px; color: var(--text-light);
  letter-spacing: 0.06em; margin-bottom: 8px;
}
.journal-text { font-size: 14px; color: var(--text-mid); line-height: 1.75; margin-bottom: 14px; }
.journal-meta { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
.journal-ai-tag {
  font-size: 11px; color: var(--sage-dark);
  background: var(--sage-pale); border: 1px solid var(--sage-light);
  padding: 3px 10px; border-radius: 100px;
}
.journal-humidity {
  font-size: 11px; color: var(--brown);
  background: var(--brown-pale);
  border: 1px solid rgba(139,111,94,0.25);
  padding: 3px 10px; border-radius: 100px;
}

.journal-write { position: sticky; top: 84px; }
.journal-write textarea {
  width: 100%; min-height: 160px; resize: vertical;
  font-family: 'Gowun Batang', serif;
  font-size: 15px; line-height: 1.8;
  color: var(--text-dark);
  border: 1px solid var(--border);
  border-radius: 12px; padding: 16px;
  background: transparent; outline: none;
  transition: border 0.2s;
}
.journal-write textarea:focus { border-color: var(--sage); }
.write-footer { display: flex; gap: 10px; margin-top: 12px; align-items: center; }
.ai-analyze-btn {
  background: var(--brown-pale);
  border: 1px solid var(--brown-light);
  color: var(--brown); padding: 8px 16px;
  border-radius: 10px; font-size: 12px;
  cursor: pointer; transition: all 0.2s;
  white-space: nowrap;
}
.ai-analyze-btn:hover { background: var(--brown-light); color: white; }

.ai-suggestion {
  background: linear-gradient(135deg, var(--sage-pale), var(--brown-pale));
  border: 1px solid var(--border);
  border-radius: 12px; padding: 16px;
  margin-top: 12px;
  font-size: 13px; color: var(--text-mid); line-height: 1.7;
}
.ai-suggestion-label {
  font-size: 10px; letter-spacing: 0.08em; color: var(--sage-dark);
  text-transform: uppercase; margin-bottom: 8px; font-weight: 600;
}

input[type=file] { display: none; }

/* ── LOADING ── */
.typing {
  display: inline-flex; gap: 4px; align-items: center;
}
.typing span {
  width: 5px; height: 5px; background: var(--sage);
  border-radius: 50%; animation: bounce 1.2s infinite;
}
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-5px)} }

@media (max-width: 900px) {
  .stat-bar { grid-template-columns: repeat(2, 1fr); }
  .humidity-layout, .journal-layout { grid-template-columns: 1fr; }
  .journal-write { position: static; }
}
@media (max-width: 600px) {
  .stat-bar { grid-template-columns: 1fr 1fr; }
  main { padding: 1rem; }
  header { padding: 0 1rem; }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">🌿</div>
      장미허브 성장일지
    </div>
    <nav>
      <button class="nav-btn active" onclick="switchPage('gallery')">갤러리</button>
      <button class="nav-btn" onclick="switchPage('humidity')">습도</button>
      <button class="nav-btn" onclick="switchPage('journal')">일지</button>
    </nav>
    <div class="status-pill">
      <div class="pulse"></div>
      스마트팜 연결됨
    </div>
  </div>
</header>

<main>
  <!-- STAT BAR -->
  <div class="stat-bar">
    <div class="stat-card">
      <div class="stat-label">현재 습도</div>
      <div class="stat-value" id="stat-humidity">-</div>
      <div class="stat-sub">적정 범위: 60~80%</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">오늘 평균 습도</div>
      <div class="stat-value" id="stat-avg">-</div>
      <div class="stat-sub" id="stat-avg-sub">측정 기록 기준</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">등록 사진</div>
      <div class="stat-value" id="stat-photos">0<span>장</span></div>
      <div class="stat-sub">AI 분석 완료</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">기록 일수</div>
      <div class="stat-value" id="stat-days">19<span>일째</span></div>
      <div class="stat-sub" id="stat-day-sub">시작: 2025.04.11</div>
    </div>
  </div>

  <!-- ══════════ GALLERY PAGE ══════════ -->
  <div class="page active" id="page-gallery">
    <div class="page-header">
      <div class="page-title">사진 갤러리</div>
      <button class="btn btn-primary" onclick="openUploadModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        사진 추가 &amp; AI 분석
      </button>
    </div>
    <div class="gallery-grid" id="galleryGrid">
      <div class="upload-card" onclick="openUploadModal()">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <p>사진을 업로드하고</p>
        <p>AI로 식물 상태 분석</p>
        <small>JPG, PNG, WEBP 지원</small>
      </div>
    </div>
  </div>

  <!-- ══════════ HUMIDITY PAGE ══════════ -->
  <div class="page" id="page-humidity">
    <div class="humidity-layout">
      <div>
        <div class="page-header">
          <div class="page-title">습도 기록</div>
        </div>
        <div class="card" style="margin-bottom:16px">
          <div class="card-title">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>
            오늘 습도 변화
          </div>
          <div class="chart-container">
            <canvas id="humidityChart"></canvas>
          </div>
        </div>
        <div class="card">
          <div class="card-title">전체 기록</div>
          <table class="log-table">
            <thead>
              <tr>
                <th>시간</th><th>습도</th><th>상태</th><th>메모</th>
              </tr>
            </thead>
            <tbody id="logTableBody"></tbody>
          </table>
        </div>
      </div>
      <div>
        <div class="card" style="position:sticky;top:84px">
          <div class="card-title">습도 기록 추가</div>
          <div class="hum-form">
            <div class="form-row">
              <label class="form-label">측정 습도 (%)</label>
              <input class="form-input" type="number" id="humInput" min="0" max="100" placeholder="예: 68">
            </div>
            <div class="form-row">
              <label class="form-label">측정 시간</label>
              <input class="form-input" type="time" id="timeInput">
            </div>
            <div class="form-row">
              <label class="form-label">메모 (선택)</label>
              <textarea class="form-input form-textarea" id="humNote" placeholder="특이사항을 적어주세요"></textarea>
            </div>
            <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="addHumidity()">기록 저장</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ══════════ JOURNAL PAGE ══════════ -->
  <div class="page" id="page-journal">
    <div class="journal-layout">
      <div>
        <div class="page-header">
          <div class="page-title">성장 일지</div>
        </div>
        <div class="journal-entries" id="journalEntries"></div>
      </div>
      <div class="journal-write">
        <div class="card">
          <div class="card-title">오늘의 일지 작성</div>
          <textarea id="journalText" placeholder="오늘 장미허브는 어떤가요? 관찰한 내용을 자유롭게 적어보세요..."></textarea>
          <div class="write-footer">
            <button class="ai-analyze-btn" onclick="analyzeJournal()">✦ AI 도움 받기</button>
            <button class="btn btn-primary btn-sm" style="margin-left:auto" onclick="saveJournal()">일지 저장</button>
          </div>
          <div class="ai-suggestion" id="aiSuggestion" style="display:none"></div>
        </div>
      </div>
    </div>
  </div>
</main>

<!-- ══════════ UPLOAD MODAL ══════════ -->
<div class="modal-overlay" id="uploadModal">
  <div class="modal">
    <h3>사진 업로드 &amp; AI 분석</h3>
    <div class="modal-img-preview" id="modalPreview" onclick="document.getElementById('fileInput').click()" style="cursor:pointer">
      <div class="modal-img-placeholder" id="previewPlaceholder">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity:.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        <p style="font-size:13px;color:var(--sage-dark)">클릭하여 사진 선택</p>
      </div>
      <img id="previewImg" style="display:none;width:100%;height:100%;object-fit:cover">
    </div>
    <input type="file" id="fileInput" accept="image/*" onchange="previewFile(this)">

    <div class="form-row">
      <label class="form-label">측정 습도 (%)</label>
      <input class="form-input" type="number" id="modalHumidity" min="0" max="100" placeholder="예: 68">
    </div>
    <div class="form-row">
      <label class="form-label">추가 메모 (선택)</label>
      <textarea class="form-input form-textarea" id="modalNote" placeholder="오늘 특이사항이 있다면 적어주세요"></textarea>
    </div>

    <div class="ai-result" id="aiResult" style="display:none"></div>

    <div class="modal-footer">
      <button class="btn btn-outline btn-sm" onclick="closeModal()">취소</button>
      <button class="btn btn-outline btn-sm" onclick="runAIAnalysis()" id="analyzeBtn">✦ AI 분석</button>
      <button class="btn btn-primary btn-sm" onclick="savePhoto()">저장</button>
    </div>
  </div>
</div>

<script>
// ── STATE ──
const startDate = new Date('2025-04-11');
let photos = [];
let humidityLogs = [];
let journalEntries = [];
let currentFile = null;
let aiAnalysisResult = '';
let chart = null;

// ── NAV ──
function switchPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  event.currentTarget.classList.add('active');
  if (name === 'humidity') renderChart();
}

// ── STATS ──
function updateStats() {
  const cur = humidityLogs.length ? humidityLogs[humidityLogs.length - 1].h : '-';
  const avg = humidityLogs.length ? Math.round(humidityLogs.reduce((s, l) => s + l.h, 0) / humidityLogs.length) : '-';
  document.getElementById('stat-humidity').innerHTML = (cur === '-' ? '-' : cur + '<span>%</span>');
  document.getElementById('stat-avg').innerHTML = (avg === '-' ? '-' : avg + '<span>%</span>');
  document.getElementById('stat-photos').innerHTML = photos.length + '<span>장</span>';
  const days = Math.max(1, Math.floor((Date.now() - startDate) / 86400000) + 1);
  document.getElementById('stat-days').innerHTML = days + '<span>일째</span>';
}

// ── HUMIDITY ──
function badgeHtml(h) {
  if (h < 50) return '<span class="hum-badge hum-low">낮음</span>';
  if (h > 80) return '<span class="hum-badge hum-high">높음</span>';
  return '<span class="hum-badge hum-ok">적정</span>';
}
function renderLogTable() {
  const tbody = document.getElementById('logTableBody');
  if (!humidityLogs.length) {
    tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;padding:2rem;color:var(--text-light);font-size:13px">아직 기록된 습도가 없어요. 오른쪽에서 추가해보세요!</td></tr>`;
    return;
  }
  tbody.innerHTML = humidityLogs.slice().reverse().map(l =>
    `<tr><td>${l.time}</td><td style="font-weight:500">${l.h}%</td><td>${badgeHtml(l.h)}</td><td style="color:var(--text-light)">${l.note || '-'}</td></tr>`
  ).join('');
}
function addHumidity() {
  const h = parseInt(document.getElementById('humInput').value);
  const t = document.getElementById('timeInput').value;
  const note = document.getElementById('humNote').value;
  if (!h || isNaN(h)) { alert('습도를 입력해주세요'); return; }
  const time = t || new Date().toTimeString().slice(0, 5);
  humidityLogs.push({time, h, note});
  document.getElementById('humInput').value = '';
  document.getElementById('humNote').value = '';
  renderLogTable();
  renderChart();
  updateStats();
}
function renderChart() {
  const ctx = document.getElementById('humidityChart').getContext('2d');
  if (chart) chart.destroy();
  if (!humidityLogs.length) {
    ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
    return;
  }
  const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const gridColor = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.06)';
  const textColor = isDark ? 'rgba(255,255,255,0.4)' : 'rgba(107,91,78,0.7)';
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: humidityLogs.map(l => l.time),
      datasets: [{
        data: humidityLogs.map(l => l.h),
        borderColor: '#7A9E7E',
        backgroundColor: 'rgba(122,158,126,0.10)',
        fill: true, tension: 0.45,
        pointRadius: 4, pointBackgroundColor: '#7A9E7E',
        pointBorderColor: 'white', pointBorderWidth: 2,
        borderWidth: 2
      }, {
        data: humidityLogs.map(() => 60),
        borderColor: 'rgba(122,158,126,0.3)',
        borderDash: [4,4], borderWidth: 1,
        pointRadius: 0, fill: false
      }, {
        data: humidityLogs.map(() => 80),
        borderColor: 'rgba(122,158,126,0.3)',
        borderDash: [4,4], borderWidth: 1,
        pointRadius: 0, fill: false
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: {
        backgroundColor: 'rgba(247,243,238,0.95)',
        titleColor: '#6B5B4E', bodyColor: '#6B5B4E',
        borderColor: 'rgba(122,158,126,0.3)', borderWidth: 1,
        callbacks: { label: ctx => ' 습도: ' + ctx.raw + '%' }
      }},
      scales: {
        y: { min: 30, max: 100, grid: { color: gridColor },
             ticks: { color: textColor, font: { size: 11 }, callback: v => v + '%' }},
        x: { grid: { display: false }, ticks: { color: textColor, font: { size: 11 }}}
      }
    }
  });
}

function renderGalleryEmpty() {
  const grid = document.getElementById('galleryGrid');
  const hasEmpty = grid.querySelector('.gallery-empty');
  const hasCards = grid.querySelector('.photo-card');
  if (!hasCards && !hasEmpty) {
    const el = document.createElement('div');
    el.className = 'gallery-empty';
    el.style = 'grid-column:1/-1;padding:3rem;text-align:center;color:var(--text-light);background:var(--warm-white);border:1px solid var(--border);border-radius:16px';
    el.innerHTML = '<p style="font-size:32px;margin-bottom:12px">📷</p><p style="font-size:14px">아직 등록된 사진이 없어요.</p><p style="font-size:12px;margin-top:6px">위의 버튼을 눌러 사진을 추가하고 AI 분석을 받아보세요!</p>';
    grid.insertBefore(el, grid.lastElementChild);
  }
}
function openUploadModal() {
  document.getElementById('uploadModal').classList.add('open');
  document.getElementById('aiResult').style.display = 'none';
  document.getElementById('previewImg').style.display = 'none';
  document.getElementById('previewPlaceholder').style.display = 'flex';
  document.getElementById('modalHumidity').value = '';
  document.getElementById('modalNote').value = '';
  currentFile = null; aiAnalysisResult = '';
}
function closeModal() {
  document.getElementById('uploadModal').classList.remove('open');
}
document.getElementById('uploadModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});
function previewFile(input) {
  if (!input.files || !input.files[0]) return;
  currentFile = input.files[0];
  const url = URL.createObjectURL(currentFile);
  const img = document.getElementById('previewImg');
  img.src = url; img.style.display = 'block';
  document.getElementById('previewPlaceholder').style.display = 'none';
  input.value = '';
}

async function runAIAnalysis() {
  if (!currentFile) { alert('먼저 사진을 선택해주세요'); return; }
  const resultEl = document.getElementById('aiResult');
  resultEl.style.display = 'flex';
  resultEl.className = 'ai-result loading';
  resultEl.innerHTML = '<div class="ai-spinner"></div><span>AI가 식물 상태를 분석하고 있어요...</span>';

  const humidity = document.getElementById('modalHumidity').value || '측정값 없음';
  const note = document.getElementById('modalNote').value || '';

  const base64 = await fileToBase64(currentFile);
  const mediaType = currentFile.type || 'image/jpeg';

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `당신은 식물 전문가 AI입니다. 업로드된 사진을 보고 장미허브(Plectranthus amboinicus)의 상태를 분석해주세요.
분석 결과를 다음 JSON 형식으로만 반환하세요 (마크다운 없이):
{
  "status": "건강|주의|위험",
  "summary": "2-3문장의 전체 상태 요약",
  "details": ["세부 관찰 1", "세부 관찰 2", "세부 관찰 3"],
  "recommendation": "1-2문장의 관리 권장 사항",
  "tags": ["태그1", "태그2", "태그3"]
}`,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } },
            { type: 'text', text: `현재 측정 습도: ${humidity}%\n추가 메모: ${note || '없음'}\n\n위 장미허브 사진을 분석해주세요.` }
          ]
        }]
      })
    });

    const data = await response.json();
    const text = data.content.map(i => i.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);
    aiAnalysisResult = parsed;

    const statusColor = parsed.status === '건강' ? 'var(--sage-dark)' : parsed.status === '주의' ? '#92400E' : '#991B1B';
    resultEl.className = 'ai-result';
    resultEl.innerHTML = `
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <span style="font-size:12px;font-weight:600;color:${statusColor}">${parsed.status}</span>
        <span style="font-size:11px;color:var(--text-light)">· AI 분석 완료</span>
      </div>
      <p style="margin-bottom:8px">${parsed.summary}</p>
      <ul style="padding-left:16px;margin-bottom:8px;font-size:12px;color:var(--text-light)">
        ${parsed.details.map(d => `<li>${d}</li>`).join('')}
      </ul>
      <p style="font-size:12px;color:var(--sage-dark);background:var(--sage-pale);padding:8px 12px;border-radius:8px;margin-top:8px">💡 ${parsed.recommendation}</p>
    `;
  } catch (err) {
    resultEl.className = 'ai-result';
    resultEl.innerHTML = '<p style="color:var(--text-light)">분석 중 오류가 발생했습니다. 사진을 다시 확인해주세요.</p>';
    console.error(err);
  }
}

function savePhoto() {
  const humidity = document.getElementById('modalHumidity').value;
  const note = document.getElementById('modalNote').value;
  const now = new Date();
  const dateStr = now.toLocaleDateString('ko') + ' ' + now.toTimeString().slice(0, 5);
  const imgSrc = document.getElementById('previewImg').src;

  let analysis = '(AI 분석 없음) ' + (note || '');
  let tags = [];
  if (aiAnalysisResult && typeof aiAnalysisResult === 'object') {
    analysis = aiAnalysisResult.summary;
    tags = aiAnalysisResult.tags || [];
  }

  photos.push({ date: dateStr, humidity, analysis, tags, imgSrc: currentFile ? imgSrc : null });

  const grid = document.getElementById('galleryGrid');
  const emptyEl = grid.querySelector('.gallery-empty');
  if (emptyEl) emptyEl.remove();
  const uploadTile = grid.lastElementChild;
  const card = document.createElement('div');
  card.className = 'photo-card';
  const imgContent = currentFile
    ? `<img src="${imgSrc}" style="width:100%;height:100%;object-fit:cover;display:block">`
    : `<div class="photo-placeholder-wrap"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity:.4"><rect x="3" y="3" width="18" height="18" rx="3"/></svg></div>`;

  card.innerHTML = `
    <div class="photo-img-wrap">
      ${imgContent}
      <div class="photo-ai-badge">${aiAnalysisResult ? 'AI 분석 완료' : '사진 등록됨'}</div>
    </div>
    <div class="photo-info">
      <div class="photo-date">${dateStr}${humidity ? ' · 습도 ' + humidity + '%' : ''}</div>
      <div class="photo-analysis">${analysis}</div>
      <div class="photo-tags">${tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
    </div>`;
  grid.insertBefore(card, uploadTile);
  updateStats();
  closeModal();
}

function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = () => rej(new Error('파일 읽기 실패'));
    r.readAsDataURL(file);
  });
}

// ── JOURNAL ──
function renderJournal() {
  const container = document.getElementById('journalEntries');
  if (!journalEntries.length) {
    container.innerHTML = `<div style="padding:3rem;text-align:center;color:var(--text-light);background:var(--warm-white);border:1px solid var(--border);border-radius:16px">
      <p style="font-size:32px;margin-bottom:12px">📔</p>
      <p style="font-size:14px">아직 작성된 일지가 없어요.</p>
      <p style="font-size:12px;margin-top:6px">오른쪽에서 오늘의 일지를 작성해보세요!</p>
    </div>`;
    return;
  }
  container.innerHTML = journalEntries.slice().reverse().map(e => `
    <div class="journal-entry">
      <div class="journal-date">${e.date}</div>
      <div class="journal-text">${e.text}</div>
      <div class="journal-meta">
        ${e.aiTag ? `<span class="journal-ai-tag">✦ ${e.aiTag}</span>` : ''}
        ${e.humidity ? `<span class="journal-humidity">💧 ${e.humidity}%</span>` : ''}
        ${(e.tags||[]).map(t => `<span class="tag">${t}</span>`).join('')}
      </div>
    </div>`).join('');
}

async function analyzeJournal() {
  const text = document.getElementById('journalText').value;
  if (!text.trim()) { alert('일지 내용을 먼저 입력해주세요'); return; }
  const suggEl = document.getElementById('aiSuggestion');
  suggEl.style.display = 'block';
  suggEl.innerHTML = `<div class="ai-suggestion-label">AI 분석 중</div><div class="typing"><span></span><span></span><span></span></div>`;

  const curHumidity = humidityLogs[humidityLogs.length - 1]?.h || '측정값 없음';

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `당신은 식물 재배 전문가입니다. 장미허브(Plectranthus amboinicus) 성장일지를 읽고, 관리에 도움이 되는 짧고 친근한 코멘트와 다음 행동 제안을 해주세요. 2-4문장으로 간결하게 답변하세요. 친근한 한국어로 답변하세요.`,
        messages: [{
          role: 'user',
          content: `오늘의 일지: "${text}"\n현재 습도: ${curHumidity}%\n\n이 일지에 대한 조언을 해주세요.`
        }]
      })
    });
    const data = await response.json();
    const reply = data.content.map(i => i.text || '').join('');
    suggEl.innerHTML = `<div class="ai-suggestion-label">✦ AI 코멘트</div>${reply}`;
  } catch (err) {
    suggEl.innerHTML = `<div class="ai-suggestion-label">AI 코멘트</div>분석 중 오류가 발생했습니다.`;
  }
}

function saveJournal() {
  const text = document.getElementById('journalText').value;
  if (!text.trim()) { alert('일지 내용을 입력해주세요'); return; }
  const now = new Date();
  const dateStr = now.toLocaleDateString('ko') + ' ' + now.toTimeString().slice(0, 5);
  const curHumidity = humidityLogs[humidityLogs.length - 1]?.h || null;
  const aiSugg = document.getElementById('aiSuggestion').innerText;
  const hasAI = aiSugg && !aiSugg.includes('AI 분석 중');

  journalEntries.push({
    date: dateStr,
    text,
    humidity: curHumidity,
    aiTag: hasAI ? 'AI 코멘트 포함' : '',
    tags: []
  });
  document.getElementById('journalText').value = '';
  document.getElementById('aiSuggestion').style.display = 'none';
  renderJournal();
}

// ── INIT ──
function init() {
  const now = new Date();
  document.getElementById('timeInput').value = now.toTimeString().slice(0, 5);
  renderLogTable();
  renderJournal();
  renderGalleryEmpty();
  updateStats();
}
init();
</script>
</body>
</html>
